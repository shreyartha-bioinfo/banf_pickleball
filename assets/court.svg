<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" role="img" aria-label="Pickleball court diagram">
  <!-- Court: 44ft x 20ft => 10px per ft -->
  <g fill="none" stroke="#ffffff" stroke-width="3">
    <!-- outer boundary -->
    <rect x="20" y="20" width="440" height="200"/>
    <!-- kitchen (non-volley) lines: 7ft either side of the 22ft net line -->
    <line x1="170" y1="20" x2="170" y2="220"/>
    <line x1="310" y1="20" x2="310" y2="220"/>
    <!-- centre service lines: from baseline to kitchen line only -->
    <line x1="20" y1="120" x2="170" y2="120"/>
    <line x1="310" y1="120" x2="460" y2="120"/>
  </g>
  <!-- net -->
  <line x1="240" y1="12" x2="240" y2="228" stroke="#ffffff" stroke-width="5" stroke-dasharray="7 6"/>
</svg>
